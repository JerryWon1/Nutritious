<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nutritious</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="app-header">
        <div class="app-header__brand">
          <h1 class="app-title">Nutritious</h1>
          <p class="app-subtitle">Smart nutrition tracking</p>
        </div>
        <button id="header-refresh" type="button" class="icon-btn" aria-label="Refresh current page" title="Refresh">
          <svg class="icon-btn__svg" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M4 12a8 8 0 0 1 14-5.5M20 12a8 8 0 0 1-14 5.5M20 4v5h-5M4 20v-5h5" />
          </svg>
        </button>
      </header>

      <div id="chain-bar" class="chain-bar hidden">
        <span class="chain-bar__dot" aria-hidden="true"></span>
        <span id="chain-bar-text" class="chain-bar__text"></span>
      </div>

      <div class="tab-list" role="tablist">
        <button id="tab-items" class="tab-list__btn active" type="button" role="tab" aria-selected="true">Menu Items</button>
        <button id="tab-goals" class="tab-list__btn" type="button" role="tab" aria-selected="false">Goals</button>
      </div>

      <section id="items-view" class="panel" role="tabpanel">
        <div id="diet-filters" class="card filter-panel">
          <button type="button" id="filter-panel-toggle" class="filter-panel__head" aria-expanded="true">
            <span>Diet &amp; allergen filters</span>
            <svg class="filter-panel__chevron" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2" d="M6 9l6 6 6-6" />
            </svg>
          </button>
          <div id="filter-panel-body" class="filter-panel__body">
            <p class="filter-panel__hint">Select dietary preferences to filter menu items</p>
            <div class="filter-grid">
              <label class="filter-check"><input id="filter-vegetarian" type="checkbox" /> Vegetarian</label>
              <label class="filter-check"><input id="filter-vegan" type="checkbox" /> Vegan</label>
              <label class="filter-check"><input id="filter-gluten-free" type="checkbox" /> Gluten-free</label>
              <label class="filter-check"><input id="filter-dairy-free" type="checkbox" /> Dairy-free</label>
              <label class="filter-check"><input id="filter-nut-free" type="checkbox" /> Nut-free</label>
              <label class="filter-check"><input id="filter-low-carb" type="checkbox" /> Low-carb</label>
            </div>
          </div>
        </div>

        <div id="meal-cart-panel" class="card meal-cart hidden"></div>
        <div id="compare-panel" class="card compare-panel hidden">
          <div class="compare-panel__head">
            <h2 id="compare-panel-title" class="compare-panel__title">Compare</h2>
            <button
              type="button"
              id="compare-panel-close"
              class="icon-btn compare-panel__close"
              aria-label="Close compare"
              title="Close compare"
            >
              <svg class="icon-btn__svg" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M6 6l12 12M18 6L6 18" />
              </svg>
            </button>
          </div>
          <div id="compare-panel-grid" class="compare-grid"></div>
        </div>

        <h2 class="section-title">Menu items</h2>
        <div id="items-list" class="items-list"></div>

        <footer class="panel-footer">
          <label class="import-link">
            <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
              <path fill="none" stroke="currentColor" stroke-width="2" d="M12 3v12m0 0l4-4m-4 4L8 11M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" />
            </svg>
            <span>Import CSV with Name, Calories, Protein, Carbs, Fat columns</span>
            <input id="csv-import" type="file" accept=".csv,text/csv" class="import-link__input" />
          </label>
          <p id="last-refreshed" class="last-refreshed">Last refreshed —</p>
        </footer>
      </section>

      <section id="goals-view" class="panel hidden" role="tabpanel">
        <div class="card progress-card">
          <div class="progress-card__head">
            <h2 class="card-title">Progress</h2>
            <span id="goal-progress" class="progress-card__week"></span>
          </div>
          <div id="goal-progress-macros" class="progress-macros" aria-live="polite"></div>
        </div>

        <form id="goals-form" class="goals-form">
          <div class="card">
            <h2 class="card-title">Program length</h2>
            <div class="input-row">
              <label class="field">
                <span class="field__label">Weeks</span>
                <input id="goal-weeks" type="number" min="1" max="52" />
              </label>
              <label class="field">
                <span class="field__label">Extra days</span>
                <input id="goal-extra-days" type="number" min="0" max="6" value="0" />
              </label>
            </div>
          </div>

          <div class="card">
            <h2 class="card-title">Macro preset</h2>
            <div class="pill-row" role="group" aria-label="Macro preset">
              <button type="button" class="preset-pill" data-preset="balanced">Balanced</button>
              <button type="button" class="preset-pill" data-preset="high_protein">High Protein</button>
              <button type="button" class="preset-pill" data-preset="low_carb">Low Carb</button>
            </div>
            <button id="apply-preset" type="button" class="btn-secondary btn-secondary--block">Apply preset</button>
            <select id="macro-preset" class="visually-hidden" aria-hidden="true" tabindex="-1">
              <option value="custom">Custom</option>
              <option value="balanced">Balanced</option>
              <option value="high_protein">High protein</option>
              <option value="low_carb">Low carb</option>
            </select>
          </div>

          <div class="card">
            <h2 class="card-title">Daily macros</h2>
            <div class="macro-grid">
              <label class="field">
                <span class="field__label">Calories</span>
                <input id="calories" name="calories" type="number" min="1" required />
              </label>
              <label class="field">
                <span class="field__label">Protein (g)</span>
                <input id="protein" name="protein" type="number" min="1" required />
              </label>
              <label class="field">
                <span class="field__label">Carbs (g)</span>
                <input id="carbs" name="carbs" type="number" min="1" required />
              </label>
              <label class="field">
                <span class="field__label">Fat (g)</span>
                <input id="fat" name="fat" type="number" min="1" required />
              </label>
            </div>
          </div>

          <div class="card">
            <h2 class="card-title">Optional tracking</h2>
            <div class="macro-grid">
              <label class="field">
                <span class="field__label">Fiber (g)</span>
                <input id="fiber" name="fiber" type="number" min="0" />
              </label>
              <label class="field">
                <span class="field__label">Sugar (g)</span>
                <input id="sugar" name="sugar" type="number" min="0" />
              </label>
            </div>
          </div>

          <div class="card">
            <h2 class="card-title">Meal target (% of daily)</h2>
            <select id="meal-percent" name="mealPercent" class="field-select">
              <option value="20">20%</option>
              <option value="25">25%</option>
              <option value="30" selected>30%</option>
              <option value="35">35%</option>
              <option value="40">40%</option>
              <option value="45">45%</option>
              <option value="50">50%</option>
            </select>
          </div>

          <div class="card">
            <h2 class="card-title">Tracked macros</h2>
            <div class="tracked-macros">
              <label class="filter-check"><input id="track-calories" type="checkbox" checked disabled /> Calories</label>
              <label class="filter-check"><input id="track-protein" type="checkbox" checked /> Protein</label>
              <label class="filter-check"><input id="track-carbs" type="checkbox" checked /> Carbs</label>
              <label class="filter-check"><input id="track-fat" type="checkbox" checked /> Fat</label>
              <label class="filter-check"><input id="track-fiber" type="checkbox" /> Fiber</label>
              <label class="filter-check"><input id="track-sugar" type="checkbox" /> Sugar</label>
            </div>
          </div>

          <button type="submit" class="btn-primary btn-primary--block">Save goals</button>
        </form>
        <select id="goal-length" class="visually-hidden" aria-hidden="true" tabindex="-1">
          <option value="7">7</option>
          <option value="14">14</option>
          <option value="28" selected>28</option>
          <option value="90">90</option>
        </select>
      </section>

      <p id="status" class="status" role="status"></p>
    </main>
    <script type="module" src="./popup.ts"></script>
  </body>
</html>
